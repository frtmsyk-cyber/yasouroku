<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="夜想録">
<meta name="theme-color" content="#1a1714">
<title>夜想録 — 思考の抽象化ジャーナル</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1714;
    --paper: #f5f0e8;
    --paper-dark: #ede7d9;
    --gold: #c9a84c;
    --gold-light: #e8d5a3;
    --rust: #8b4a2f;
    --mist: #8a8275;
    --deep: #0f0d0b;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --bottom-nav-h: 60px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { height: 100%; }
  body { background: var(--paper); color: var(--ink); font-family: 'Shippori Mincho', serif; height: 100%; overflow-x: hidden; overscroll-behavior: none; }

  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9000; opacity: 0.35;
  }

  /* ===== DESKTOP LAYOUT ===== */
  .app { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }

  /* ===== SIDEBAR ===== */
  .sidebar { background: var(--ink); color: var(--paper); padding: 2rem 1.5rem; display: flex; flex-direction: column; gap: 2rem; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
  .logo { border-bottom: 1px solid #333; padding-bottom: 1.5rem; }
  .logo h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: 0.05em; color: var(--gold); }
  .logo p { font-size: 0.7rem; color: var(--mist); margin-top: 0.3rem; font-family: 'DM Mono', monospace; letter-spacing: 0.08em; }
  .nav-section h3 { font-size: 0.65rem; color: var(--mist); letter-spacing: 0.15em; text-transform: uppercase; font-family: 'DM Mono', monospace; margin-bottom: 0.8rem; }
  .nav-btn { display: block; width: 100%; text-align: left; background: none; border: none; color: var(--paper); font-family: 'Shippori Mincho', serif; font-size: 0.9rem; padding: 0.6rem 0.8rem; border-radius: 4px; cursor: pointer; transition: all 0.2s; margin-bottom: 0.3rem; }
  .nav-btn:hover, .nav-btn.active { background: rgba(201,168,76,0.15); color: var(--gold); }
  .nav-btn.active { border-left: 2px solid var(--gold); }
  .entries-list { flex: 1; overflow-y: auto; }
  .entry-item { padding: 0.7rem 0.5rem; border-bottom: 1px solid #2a2825; cursor: pointer; transition: all 0.2s; }
  .entry-item:hover { background: rgba(255,255,255,0.04); }
  .entry-item .date { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--mist); margin-bottom: 0.2rem; }
  .entry-item .preview { font-size: 0.8rem; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ===== MAIN ===== */
  .main { padding: 3rem; max-width: 860px; }

  /* ===== VIEWS ===== */
  .view { display: none; }
  .view.active { display: block; }

  /* ===== JOURNAL ===== */
  .journal-header { margin-bottom: 2.5rem; }
  .journal-header .date-display { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--mist); letter-spacing: 0.1em; margin-bottom: 0.5rem; }
  .journal-header h2 { font-size: 2.2rem; font-weight: 800; line-height: 1.2; color: var(--ink); }
  .journal-header h2 span { color: var(--gold); }

  .thought-cards { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.5rem; }
  .thought-card { background: white; border: 1px solid var(--paper-dark); border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .thought-card-header { display: flex; justify-content: space-between; align-items: center; padding: 0.8rem 1rem; background: var(--paper-dark); }
  .thought-num { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--mist); letter-spacing: 0.1em; }
  .remove-btn { background: none; border: none; color: var(--mist); cursor: pointer; font-size: 1rem; line-height: 1; padding: 4px 8px; touch-action: manipulation; }

  .textarea-wrapper { position: relative; }
  .thought-card textarea {
    width: 100%; padding: 1rem 3rem 1rem 1rem; border: none; background: white;
    font-family: 'Shippori Mincho', serif; font-size: 16px; line-height: 1.7;
    color: var(--ink); resize: none; min-height: 90px; outline: none;
    -webkit-appearance: none; border-radius: 0;
  }

  .mic-btn {
    position: absolute; bottom: 0.6rem; right: 0.6rem;
    width: 38px; height: 38px; border-radius: 50%;
    border: 1.5px solid var(--paper-dark); background: white; color: var(--mist);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 0.9rem; transition: all 0.2s; z-index: 2; touch-action: manipulation;
  }
  .mic-btn.recording { background: var(--rust); border-color: var(--rust); color: white; animation: mic-pulse 1s infinite; }

  @keyframes mic-pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(139,74,47,0.5); }
    50% { box-shadow: 0 0 0 8px rgba(139,74,47,0); }
  }

  .followup-mic {
    width: 46px; height: 46px; border-radius: 6px; border: 1px solid var(--paper-dark);
    background: white; color: var(--mist); cursor: pointer; display: flex;
    align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0;
    touch-action: manipulation; transition: all 0.2s;
  }
  .followup-mic.recording { background: var(--rust); border-color: var(--rust); color: white; animation: mic-pulse 1s infinite; }

  .add-thought-btn { background: none; border: 2px dashed var(--paper-dark); border-radius: 10px; padding: 1rem; width: 100%; cursor: pointer; color: var(--mist); font-family: 'Shippori Mincho', serif; font-size: 0.9rem; transition: all 0.2s; text-align: center; touch-action: manipulation; }
  .add-thought-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.05); }

  .analyze-btn { background: var(--ink); color: var(--gold); border: none; padding: 1rem 2.5rem; font-family: 'Shippori Mincho', serif; font-size: 1rem; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 0.6rem; transition: all 0.2s; margin-top: 1.5rem; touch-action: manipulation; width: 100%; justify-content: center; }
  .analyze-btn:hover { background: var(--deep); }
  .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ===== ANALYSIS ===== */
  .analysis-section { margin-top: 2.5rem; border-top: 1px solid var(--paper-dark); padding-top: 2rem; }
  .analysis-section h3 { font-size: 0.7rem; font-family: 'DM Mono', monospace; letter-spacing: 0.15em; color: var(--mist); text-transform: uppercase; margin-bottom: 1.5rem; }
  .chat-area { display: flex; flex-direction: column; gap: 1.2rem; margin-bottom: 1.5rem; }
  .bubble { border-radius: 14px; padding: 1rem 1.2rem; line-height: 1.75; font-size: 0.95rem; }
  .bubble.assistant { background: white; border: 1px solid var(--paper-dark); align-self: flex-start; box-shadow: 0 2px 8px rgba(0,0,0,0.05); max-width: 100%; }
  .bubble.user { background: var(--ink); color: var(--paper); align-self: flex-end; font-size: 0.9rem; max-width: 85%; }
  .bubble.thinking { background: var(--paper-dark); color: var(--mist); align-self: flex-start; font-family: 'DM Mono', monospace; font-size: 0.8rem; animation: blink 1.5s infinite; }
  @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.5} }
  .bubble h4 { font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.5rem; font-family: 'DM Mono', monospace; }

  .followup-area { display: flex; gap: 0.6rem; margin-top: 1rem; align-items: stretch; }
  .followup-area input { flex: 1; padding: 0.85rem 1rem; border: 1px solid var(--paper-dark); border-radius: 6px; background: white; font-family: 'Shippori Mincho', serif; font-size: 16px; color: var(--ink); outline: none; -webkit-appearance: none; }
  .followup-area input:focus { border-color: var(--gold); }
  .followup-send { background: var(--gold); color: var(--ink); border: none; padding: 0.85rem 1.2rem; border-radius: 6px; font-family: 'Shippori Mincho', serif; font-size: 0.9rem; cursor: pointer; font-weight: 600; white-space: nowrap; touch-action: manipulation; }

  .save-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 0.85rem 1.8rem; font-family: 'Shippori Mincho', serif; font-size: 0.9rem; border-radius: 6px; cursor: pointer; transition: all 0.2s; margin-top: 1.5rem; width: 100%; touch-action: manipulation; }
  .save-btn:hover, .save-btn:active { background: var(--gold); color: var(--ink); }

  /* ===== MAP ===== */
  .map-header { margin-bottom: 1.5rem; }
  .map-header h2 { font-size: 1.8rem; font-weight: 800; }
  .map-header p { color: var(--mist); font-size: 0.85rem; margin-top: 0.4rem; }
  #knowledge-map { width: 100%; height: 420px; background: white; border: 1px solid var(--paper-dark); border-radius: 12px; overflow: hidden; position: relative; }
  .map-node { position: absolute; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-align: center; cursor: pointer; font-size: 0.7rem; font-weight: 600; line-height: 1.3; padding: 0.5rem; word-break: break-all; box-shadow: 0 3px 12px rgba(0,0,0,0.12); transition: transform 0.2s; }
  .map-node:active { transform: scale(1.08); }
  .map-legend { display: flex; gap: 1.2rem; margin-top: 1rem; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.75rem; color: var(--mist); font-family: 'DM Mono', monospace; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .empty-map { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--mist); gap: 0.8rem; }
  .empty-map .icon { font-size: 2.5rem; opacity: 0.3; }
  .empty-map p { font-size: 0.85rem; text-align: center; padding: 0 1.5rem; }

  /* ===== PRINCIPLES ===== */
  .principles-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1.5rem; }
  .principle-card { background: white; border: 1px solid var(--paper-dark); border-radius: 10px; padding: 1.2rem; position: relative; overflow: hidden; }
  .principle-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--gold); }
  .principle-card h4 { font-size: 0.92rem; font-weight: 600; margin-bottom: 0.5rem; line-height: 1.4; }
  .principle-card .source { font-size: 0.7rem; color: var(--mist); font-family: 'DM Mono', monospace; }
  .principle-card .domain-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.6rem; }
  .principle-tag { display: inline-block; background: rgba(201,168,76,0.15); color: var(--rust); border: 1px solid rgba(201,168,76,0.4); border-radius: 3px; padding: 0.15rem 0.5rem; font-size: 0.75rem; font-family: 'DM Mono', monospace; }

  /* ===== TOAST ===== */
  .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--ink); color: var(--gold); padding: 0.8rem 1.5rem; border-radius: 6px; font-family: 'DM Mono', monospace; font-size: 0.8rem; white-space: nowrap; opacity: 0; transition: all 0.3s; z-index: 9999; }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* ===== BOTTOM NAV (mobile only) ===== */
  .bottom-nav { display: none; }

  /* ===== HISTORY OVERLAY (mobile) ===== */
  .history-overlay { display: none; position: fixed; inset: 0; background: var(--ink); z-index: 8000; flex-direction: column; padding-top: var(--safe-top); }
  .history-overlay.open { display: flex; }
  .history-overlay-header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.5rem; border-bottom: 1px solid #333; }
  .history-overlay-header h2 { font-size: 1rem; color: var(--gold); }
  .history-overlay-close { background: none; border: none; color: var(--mist); font-size: 1.5rem; cursor: pointer; padding: 6px 10px; touch-action: manipulation; }
  .history-overlay-list { flex: 1; overflow-y: auto; padding: 0.8rem 1.5rem; padding-bottom: calc(var(--bottom-nav-h) + var(--safe-bottom)); }
  .history-overlay-item { padding: 0.85rem 0; border-bottom: 1px solid #2a2825; cursor: pointer; }
  .history-overlay-item .date { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--mist); margin-bottom: 0.25rem; }
  .history-overlay-item .preview { font-size: 0.85rem; color: #ccc; }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--paper-dark); border-radius: 10px; }

  /* ===== MOBILE ===== */
  @media (max-width: 680px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { display: none; }

    .main {
      padding: 1.2rem 1rem;
      padding-top: calc(var(--safe-top) + 1rem);
      padding-bottom: calc(var(--bottom-nav-h) + var(--safe-bottom) + 2rem);
      max-width: 100%;
      min-height: 100dvh;
    }

    .journal-header h2 { font-size: 1.65rem; }
    .journal-header { margin-bottom: 1.5rem; }
    .principles-grid { grid-template-columns: 1fr; }
    #knowledge-map { height: 340px; }

    .bottom-nav {
      display: flex;
      position: fixed; bottom: 0; left: 0; right: 0;
      height: calc(var(--bottom-nav-h) + var(--safe-bottom));
      padding-bottom: var(--safe-bottom);
      background: var(--ink); border-top: 1px solid #2a2825; z-index: 7000;
    }

    .bn-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 3px; background: none; border: none; color: var(--mist);
      font-family: 'DM Mono', monospace; font-size: 0.55rem; letter-spacing: 0.04em;
      cursor: pointer; touch-action: manipulation; padding: 0; transition: color 0.15s;
    }
    .bn-btn .bn-icon { font-size: 1.25rem; line-height: 1; }
    .bn-btn.active { color: var(--gold); }

    .toast {
      bottom: calc(var(--bottom-nav-h) + var(--safe-bottom) + 0.8rem);
      font-size: 0.75rem; padding: 0.65rem 1.2rem;
    }
  }
</style>
</head>
<body>

<!-- History overlay (mobile) -->
<div class="history-overlay" id="history-overlay">
  <div class="history-overlay-header">
    <h2>過去の記録</h2>
    <button class="history-overlay-close" onclick="closeHistory()">✕</button>
  </div>
  <div class="history-overlay-list" id="history-overlay-list">
    <div style="color:var(--mist);font-size:0.85rem;padding:1rem 0;">まだ記録がありません</div>
  </div>
</div>

<div class="app">
  <!-- SIDEBAR (desktop) -->
  <aside class="sidebar">
    <div class="logo">
      <h1>夜想録</h1>
      <p>NIGHTLY ABSTRACTION JOURNAL</p>
    </div>
    <div class="nav-section">
      <h3>ナビゲーション</h3>
      <button class="nav-btn active" onclick="showView('journal',this)">✦ 今夜の記録</button>
      <button class="nav-btn" onclick="showView('map',this)">◈ 知識マップ</button>
      <button class="nav-btn" onclick="showView('principles',this)">⊕ 法則ライブラリ</button>
    </div>
    <div class="nav-section" style="flex:1">
      <h3>過去の記録</h3>
      <div class="entries-list" id="entries-list">
        <div style="color:var(--mist);font-size:0.8rem;padding:0.5rem;">まだ記録がありません</div>
      </div>
    </div>
    <div style="font-family:'DM Mono',monospace;font-size:0.6rem;color:#444;padding-top:1rem;border-top:1px solid #222;">
      データはブラウザに保存されます
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="main-area">

    <!-- JOURNAL VIEW -->
    <div class="view active" id="view-journal">
      <div class="journal-header">
        <div class="date-display" id="date-display"></div>
        <h2>今日の出来事を<span>振り返り</span>ましょう</h2>
      </div>

      <div class="thought-cards" id="thought-cards">
        <div class="thought-card">
          <div class="thought-card-header">
            <span class="thought-num">THOUGHT · 01</span>
          </div>
          <div class="textarea-wrapper">
            <textarea placeholder="今日、心に残ったこと、気になったこと、感じたことを自由に書いてください..." rows="3"></textarea>
            <button class="mic-btn" onclick="toggleMic(this)">🎤</button>
          </div>
        </div>
      </div>

      <button class="add-thought-btn" id="add-btn" onclick="addThought()">
        ＋ もうひとつ追加（最大3つ）
      </button>

      <button class="analyze-btn" id="analyze-btn" onclick="startAnalysis()">
        <span>✦</span> Claudeと深掘りする
      </button>

      <div class="analysis-section" id="analysis-section" style="display:none">
        <h3>ABSTRACTION SESSION</h3>
        <div class="chat-area" id="chat-area"></div>
        <div class="followup-area" id="followup-area" style="display:none">
          <input type="text" id="followup-input" placeholder="さらに深掘りしたいことを..." autocomplete="off"
                 onkeydown="if(event.key==='Enter')sendFollowup()">
          <button class="followup-mic" onclick="toggleMic(this)">🎤</button>
          <button class="followup-send" onclick="sendFollowup()">送る</button>
        </div>
        <button class="save-btn" id="save-btn" style="display:none" onclick="saveEntry()">
          この洞察を保存する →
        </button>
      </div>
    </div>

    <!-- MAP VIEW -->
    <div class="view" id="view-map">
      <div class="map-header">
        <h2>知識マップ</h2>
        <p>蓄積した法則と思考のつながりを可視化します</p>
      </div>
      <div id="knowledge-map">
        <div class="empty-map" id="map-empty">
          <div class="icon">◈</div>
          <p>記録を保存すると、ここに知識マップが現れます</p>
        </div>
        <canvas id="map-canvas" style="position:absolute;inset:0;display:none;"></canvas>
        <div id="map-nodes"></div>
      </div>
      <div class="map-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#c9a84c"></div>法則・原則</div>
        <div class="legend-item"><div class="legend-dot" style="background:#8b4a2f"></div>感情・観察</div>
        <div class="legend-item"><div class="legend-dot" style="background:#4a7c6b"></div>行動提案</div>
      </div>
    </div>

    <!-- PRINCIPLES VIEW -->
    <div class="view" id="view-principles">
      <div class="map-header">
        <h2>法則ライブラリ</h2>
        <p>日常から抽出された、あなただけの思考原則</p>
      </div>
      <div class="principles-grid" id="principles-grid">
        <div style="grid-column:1/-1;color:var(--mist);font-size:0.85rem;padding:2rem 0;">
          まだ法則がありません。ジャーナルを記録して保存すると、ここに蓄積されます。
        </div>
      </div>
    </div>

  </main>
</div>

<!-- BOTTOM NAV (mobile) -->
<nav class="bottom-nav" id="bottom-nav">
  <button class="bn-btn active" id="bn-journal" onclick="showView('journal',this);setBottomActive(this)">
    <span class="bn-icon">✦</span><span>記録</span>
  </button>
  <button class="bn-btn" id="bn-map" onclick="showView('map',this);setBottomActive(this)">
    <span class="bn-icon">◈</span><span>マップ</span>
  </button>
  <button class="bn-btn" id="bn-principles" onclick="showView('principles',this);setBottomActive(this)">
    <span class="bn-icon">⊕</span><span>法則</span>
  </button>
  <button class="bn-btn" onclick="openHistory()">
    <span class="bn-icon">📖</span><span>履歴</span>
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'yasouroku_v2';
let state = { entries: [], principles: [] };
let currentConversation = [], currentThoughts = [], currentAnalysisResult = null;

window.addEventListener('load', () => {
  document.getElementById('date-display').textContent =
    new Date().toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric', weekday:'long' });
  loadState(); renderSidebar(); renderHistoryOverlay();
});

function loadState() { try { const s = localStorage.getItem(STORAGE_KEY); if (s) state = JSON.parse(s); } catch(e){} }
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

// ===== NAVIGATION =====
function showView(name, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (btn && btn.classList.contains('nav-btn')) btn.classList.add('active');
  if (name === 'map') renderMap();
  if (name === 'principles') renderPrinciples();
  document.getElementById('main-area').scrollTo(0, 0);
}

function setBottomActive(btn) {
  document.querySelectorAll('.bn-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ===== HISTORY OVERLAY =====
function openHistory() { document.getElementById('history-overlay').classList.add('open'); }
function closeHistory() { document.getElementById('history-overlay').classList.remove('open'); }

function renderHistoryOverlay() {
  const list = document.getElementById('history-overlay-list');
  if (!state.entries.length) { list.innerHTML = '<div style="color:var(--mist);font-size:0.85rem;padding:1rem 0;">まだ記録がありません</div>'; return; }
  list.innerHTML = state.entries.map(e => `
    <div class="history-overlay-item" onclick="loadEntry('${e.id}');closeHistory()">
      <div class="date">${new Date(e.date).toLocaleDateString('ja-JP',{month:'long',day:'numeric'})}</div>
      <div class="preview">${esc(e.thoughts[0]||'').slice(0,40)}…</div>
    </div>
  `).join('');
}

// ===== SPEECH RECOGNITION =====
let activeRecognition = null, activeMicBtn = null;

function toggleMic(btn) {
  if (activeMicBtn === btn) { stopMic(); return; }
  if (activeRecognition) stopMic();

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('このブラウザは音声入力に非対応です'); return; }

  const card = btn.closest('.thought-card');
  const target = card ? card.querySelector('textarea') : document.getElementById('followup-input');

  const r = new SR();
  r.lang = 'ja-JP';
  r.continuous = true;
  r.interimResults = true;

  let base = target.value;
  if (base && !/[\s　]$/.test(base)) base += '　';

  r.onstart = () => {
    btn.classList.add('recording');
    activeMicBtn = btn; activeRecognition = r;
    showToast('🎤 録音中… タップで停止');
  };

  r.onresult = (e) => {
    let interim = '', fin = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) fin += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    if (fin) base += fin;
    target.value = base + interim;
    if (target.tagName === 'TEXTAREA') { target.style.height = 'auto'; target.style.height = target.scrollHeight + 'px'; }
  };

  r.onerror = (e) => {
    if (e.error === 'not-allowed') showToast('マイクのアクセスを許可してください');
    else if (e.error !== 'aborted') showToast('音声認識エラー: ' + e.error);
    stopMic();
  };

  r.onend = () => stopMic();

  try { r.start(); } catch(e) { showToast('音声認識を開始できませんでした'); }
}

function stopMic() {
  if (activeRecognition) { try { activeRecognition.stop(); } catch(e){} activeRecognition = null; }
  if (activeMicBtn) { activeMicBtn.classList.remove('recording'); activeMicBtn = null; }
}

// ===== THOUGHT INPUT =====
let thoughtCount = 1;

function addThought() {
  if (thoughtCount >= 3) return;
  thoughtCount++;
  const cards = document.getElementById('thought-cards');
  const card = document.createElement('div');
  card.className = 'thought-card';
  card.innerHTML = `
    <div class="thought-card-header">
      <span class="thought-num">THOUGHT · 0${thoughtCount}</span>
      <button class="remove-btn" onclick="removeThought(this)">✕</button>
    </div>
    <div class="textarea-wrapper">
      <textarea placeholder="今日、心に残ったこと..." rows="3"></textarea>
      <button class="mic-btn" onclick="toggleMic(this)">🎤</button>
    </div>`;
  cards.appendChild(card);
  updateAddBtn();
  card.querySelector('textarea').focus();
}

function removeThought(btn) {
  btn.closest('.thought-card').remove();
  thoughtCount--;
  updateAddBtn();
  document.querySelectorAll('.thought-num').forEach((el,i) => { el.textContent = `THOUGHT · 0${i+1}`; });
}

function updateAddBtn() { document.getElementById('add-btn').style.display = thoughtCount >= 3 ? 'none' : 'block'; }

// ===== ANALYSIS =====
async function startAnalysis() {
  const textareas = document.querySelectorAll('.thought-card textarea');
  currentThoughts = Array.from(textareas).map(t => t.value.trim()).filter(Boolean);
  if (!currentThoughts.length) { showToast('思ったことを入力してください'); return; }

  stopMic();
  document.getElementById('analyze-btn').disabled = true;
  document.getElementById('analysis-section').style.display = 'block';
  document.getElementById('chat-area').innerHTML = '';
  currentConversation = [];

  setTimeout(() => document.getElementById('analysis-section').scrollIntoView({ behavior:'smooth', block:'start' }), 100);

  addBubble('thinking', '思考を読み解いています...');

  const sys = `あなたは思考の抽象化コーチです。ユーザーの日常の「思ったこと」を深掘りし、普遍的な法則・原則を引き出すのが専門です。

以下のフォーマットで応答してください：

**【感情・観察の分離】**
各思考から感情と客観的観察を分離して示す。

**【抽象化した法則（1〜3個）】**
各法則を「〇〇は△△である」という形で1行で表現。

**【過去の思考との接続】**（もし過去の法則があれば接続する。なければ省略）

**【今日の行動提案】**
この法則をもとに明日できる具体的行動を1〜2個。

**【深掘りしたい質問】**
ユーザーがさらに探求できるよう、問いを1つ提示する。

応答は日本語で、温かくも知的な口調で。過度に形式的にならず、思考の旅の同行者として対話する。`;

  const userMsg = `今日の「思ったこと」を記録しました：\n${currentThoughts.map((t,i)=>`【${i+1}】${t}`).join('\n')}\n\n${state.principles.length>0?'過去に蓄積した法則：\n'+state.principles.map(p=>p.text).join('\n'):''}`;
  currentConversation = [{ role:'user', content:userMsg }];

  try {
    const res = await callClaude(sys, currentConversation);
    document.querySelectorAll('.bubble.thinking').forEach(b=>b.remove());
    addBubble('assistant', res);
    currentConversation.push({ role:'assistant', content:res });
    currentAnalysisResult = res;
    document.getElementById('followup-area').style.display = 'flex';
    document.getElementById('save-btn').style.display = 'block';
  } catch(e) {
    document.querySelectorAll('.bubble.thinking').forEach(b=>b.remove());
    addBubble('assistant', `エラーが発生しました: ${e.message}`);
  }
  document.getElementById('analyze-btn').disabled = false;
}

async function sendFollowup() {
  const input = document.getElementById('followup-input');
  const text = input.value.trim();
  if (!text) return;
  stopMic();
  addBubble('user', text);
  input.value = ''; input.blur();
  currentConversation.push({ role:'user', content:text });
  addBubble('thinking', '考えています...');

  try {
    const res = await callClaude('あなたは思考の抽象化コーチです。ユーザーの日常の「思ったこと」を深掘りし、法則・原則を引き出す対話を続けてください。簡潔に、深く、温かく。', currentConversation);
    document.querySelectorAll('.bubble.thinking').forEach(b=>b.remove());
    addBubble('assistant', res);
    currentConversation.push({ role:'assistant', content:res });
    currentAnalysisResult = res;
  } catch(e) {
    document.querySelectorAll('.bubble.thinking').forEach(b=>b.remove());
    addBubble('assistant', `エラー: ${e.message}`);
  }
}

async function callClaude(system, messages) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1000, system, messages })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.content.map(c=>c.text||'').join('');
}

function addBubble(type, text) {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = `bubble ${type}`;
  div.innerHTML = type === 'assistant' ? fmt(text) : esc(text);
  area.appendChild(div);
  setTimeout(() => div.scrollIntoView({ behavior:'smooth', block:'nearest' }), 50);
}

function esc(t) { return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function fmt(text) {
  return esc(text)
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/^【(.+?)】/gm,'<h4>$1</h4>')
    .replace(/^[-・]\s*/gm,'')
    .replace(/\n\n/g,'</p><p>')
    .replace(/\n/g,'<br>')
    .replace(/^/,'<p>') + '</p>';
}

// ===== SAVE =====
async function saveEntry() {
  if (!currentAnalysisResult) return;
  showToast('保存中...');
  let newPrinciples = [];
  try {
    const res = await callClaude('', [{ role:'user', content:`以下の分析テキストから「抽象化した法則」を抽出し、JSON配列で返してください。形式: [{"text":"法則の文章","domains":["ドメイン1"]}]\nJSONのみ返してください。マークダウン記号不要。\n分析テキスト:\n${currentAnalysisResult}` }]);
    newPrinciples = JSON.parse(res.replace(/```json|```/g,'').trim());
  } catch(e) {}

  const entry = { id:Date.now(), date:new Date().toISOString(), thoughts:currentThoughts, analysis:currentAnalysisResult, principles:newPrinciples, conversation:currentConversation };
  state.entries.unshift(entry);
  newPrinciples.forEach(p => { if (!state.principles.find(e=>e.text===p.text)) state.principles.push({...p, date:entry.date, entryId:entry.id}); });
  saveState(); renderSidebar(); renderHistoryOverlay();
  showToast('✦ 洞察を保存しました');
  document.getElementById('save-btn').style.display = 'none';
}

// ===== SIDEBAR =====
function renderSidebar() {
  const list = document.getElementById('entries-list');
  if (!state.entries.length) { list.innerHTML = '<div style="color:var(--mist);font-size:0.8rem;padding:0.5rem;">まだ記録がありません</div>'; return; }
  list.innerHTML = state.entries.map(e => `
    <div class="entry-item" onclick="loadEntry('${e.id}')">
      <div class="date">${new Date(e.date).toLocaleDateString('ja-JP',{month:'short',day:'numeric'})}</div>
      <div class="preview">${esc(e.thoughts[0]||'').slice(0,30)}</div>
    </div>`).join('');
}

function loadEntry(id) {
  const entry = state.entries.find(e => e.id == id);
  if (!entry) return;
  document.getElementById('thought-cards').innerHTML = entry.thoughts.map((t,i) => `
    <div class="thought-card">
      <div class="thought-card-header"><span class="thought-num">THOUGHT · 0${i+1}</span></div>
      <div class="textarea-wrapper"><textarea rows="3" readonly>${esc(t)}</textarea></div>
    </div>`).join('');
  document.getElementById('analysis-section').style.display = 'block';
  const ca = document.getElementById('chat-area'); ca.innerHTML = '';
  entry.conversation.forEach(m => { if (m.role!=='system') addBubble(m.role==='user'?'user':'assistant', m.content); });
  document.getElementById('followup-area').style.display = 'none';
  document.getElementById('save-btn').style.display = 'none';
  document.getElementById('analyze-btn').style.display = 'none';
  document.getElementById('add-btn').style.display = 'none';
  showView('journal', null);
  // Reset bottom nav
  document.querySelectorAll('.bn-btn').forEach((b,i)=>{ b.classList.toggle('active', i===0); });
  document.getElementById('main-area').scrollTo(0,0);
}

// ===== MAP =====
function renderMap() {
  const mapEl = document.getElementById('knowledge-map');
  const nodesEl = document.getElementById('map-nodes');
  const canvas = document.getElementById('map-canvas');
  const empty = document.getElementById('map-empty');
  if (!state.principles.length) { empty.style.display='flex'; canvas.style.display='none'; nodesEl.innerHTML=''; return; }
  empty.style.display='none'; canvas.style.display='block';
  const W=mapEl.clientWidth, H=mapEl.clientHeight;
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d'); ctx.clearRect(0,0,W,H);
  const colors=['#c9a84c','#8b4a2f','#4a7c6b','#5a4a7c','#7c4a6b'];
  const nodes=state.principles.slice(0,12).map((p,i)=>{
    const a=(i/Math.max(state.principles.length,6))*Math.PI*2;
    const r=Math.min(W,H)*0.28;
    return {x:W/2+r*Math.cos(a), y:H/2+r*Math.sin(a), size:60+Math.random()*25, text:p.text.slice(0,16), color:colors[i%colors.length]};
  });
  ctx.strokeStyle='rgba(201,168,76,0.12)'; ctx.lineWidth=1.5;
  for(let i=0;i<nodes.length;i++) for(let j=i+1;j<nodes.length;j++) if(Math.random()>0.5){ctx.beginPath();ctx.moveTo(nodes[i].x,nodes[i].y);ctx.lineTo(nodes[j].x,nodes[j].y);ctx.stroke();}
  nodesEl.innerHTML=nodes.map((n,i)=>`<div class="map-node" style="left:${n.x-n.size/2}px;top:${n.y-n.size/2}px;width:${n.size}px;height:${n.size}px;background:${n.color};color:${n.color==='#c9a84c'?'#1a1714':'white'};" title="${esc(state.principles[i]?.text||'')}">${esc(n.text)}…</div>`).join('');
}

// ===== PRINCIPLES =====
function renderPrinciples() {
  const grid = document.getElementById('principles-grid');
  if (!state.principles.length) { grid.innerHTML='<div style="grid-column:1/-1;color:var(--mist);font-size:0.85rem;padding:2rem 0;">まだ法則がありません。</div>'; return; }
  grid.innerHTML=state.principles.map(p=>`
    <div class="principle-card">
      <h4>${esc(p.text)}</h4>
      <div class="domain-tags">${(p.domains||[]).map(d=>`<span class="principle-tag">${esc(d)}</span>`).join('')}</div>
      <div class="source">${new Date(p.date).toLocaleDateString('ja-JP',{month:'short',day:'numeric'})}の記録より</div>
    </div>`).join('');
}

// ===== TOAST =====
function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}
</script>
